name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build (${{ matrix.plugin }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        plugin:
          - otel/grafana
          - auth/supabase
          - swagger/ui

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.plugin }}/go.mod
          cache-dependency-path: ${{ matrix.plugin }}/go.sum

      - name: go build
        working-directory: ${{ matrix.plugin }}
        run: go build ./...

  lint:
    name: Lint (${{ matrix.plugin }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        plugin:
          - otel/grafana
          - auth/supabase
          - swagger/ui

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.plugin }}/go.mod
          cache-dependency-path: ${{ matrix.plugin }}/go.sum

      - uses: golangci/golangci-lint-action@v6
        with:
          working-directory: ${{ matrix.plugin }}
          version: latest

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: e2e/go.mod
          cache-dependency-path: e2e/go.sum

      - name: make e2e
        run: make e2e

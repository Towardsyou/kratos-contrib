openapi: "3.0.3"
info:
  title: Example API
  version: "1.0.0"
  description: A minimal OpenAPI spec for demonstration.

servers:
  - url: http://localhost:8080

paths:
  /oauth/token:
    post:
      summary: OAuth2 Password Grant (RFC 6749)
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [grant_type, username, password]
              properties:
                grant_type:
                  type: string
                  enum: [password]
                username:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        "200":
          description: Token issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenError"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenError"

components:
  schemas:
    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: bearer
        expires_in:
          type: integer
          example: 3600
        refresh_token:
          type: string
    TokenError:
      type: object
      properties:
        error:
          type: string
          example: invalid_grant
        error_description:
          type: string

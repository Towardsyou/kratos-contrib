openapi: "3.0.3"
info:
  title: Example API
  version: "1.0.0"
  description: A minimal OpenAPI spec for demonstration.

servers:
  - url: http://localhost:8080

# Apply bearerAuth globally; individual endpoints can override or remove it.
security:
  - bearerAuth: []

paths:
  /oauth/token:
    post:
      summary: OAuth2 Password Grant (RFC 6749 §4.3)
      description: |
        Exchange username + password for a JWT access token.
        This endpoint is public and does **not** require a Bearer token.
      # This endpoint is public — override the global security requirement.
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [grant_type, username, password]
              properties:
                grant_type:
                  type: string
                  enum: [password]
                  example: password
                username:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  format: password
      responses:
        "200":
          description: Token issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenError"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenError"

  /api/me:
    get:
      summary: Get current user (example protected endpoint)
      # Inherits global bearerAuth security requirement.
      responses:
        "200":
          description: Current user info
        "401":
          description: Unauthorized

components:
  securitySchemes:
    # Option 1 — paste a JWT directly into the Authorize dialog.
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

    # Option 2 — let Swagger UI call /oauth/token and manage the token automatically.
    # Click "Authorize", enter your email as "username" and your password,
    # then Swagger UI will obtain and attach the Bearer token on every request.
    oauth2Password:
      type: oauth2
      flows:
        password:
          tokenUrl: /oauth/token
          scopes: {}   # Supabase does not use scopes for password grant

  schemas:
    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: bearer
        expires_in:
          type: integer
          example: 3600
        refresh_token:
          type: string
    TokenError:
      type: object
      properties:
        error:
          type: string
          example: invalid_grant
        error_description:
          type: string

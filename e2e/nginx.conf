events {}

http {
    server {
        listen 8000;

        # Strip the /auth/v1 prefix that supabase-go appends and proxy to GoTrue.
        # The trailing slash on proxy_pass causes nginx to replace the matched
        # location prefix, so /auth/v1/signup becomes /signup on the upstream.
        location /auth/v1/ {
            proxy_pass         http://gotrue:9999/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
